<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Subscription Expiring Soon</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px">
  <div style="max-width:520px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08)">
    <div style="background:linear-gradient(135deg,#f59e0b,#d97706);padding:36px;text-align:center">
      <div style="font-size:48px">⏰</div>
      <h1 style="color:#fff;margin:12px 0 0;font-size:22px">Your plan expires in {{ days_left }} day{{ 's' if days_left != 1 else '' }}</h1>
    </div>
    <div style="padding:36px 40px">
      <p style="color:#333;font-size:16px">Hi <strong>{{ name }}</strong>,</p>
      <p style="color:#555;font-size:15px;line-height:1.6">Your <strong>{{ plan_name }}</strong> subscription is expiring soon. Renew now to keep uninterrupted access to all features.</p>
      <a href="#" style="display:inline-block;background:linear-gradient(135deg,#6c47ff,#a855f7);color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:16px">Renew Subscription</a>
    </div>
    <div style="background:#f9f9f9;padding:20px;text-align:center;border-top:1px solid #eee">
      <p style="color:#aaa;font-size:12px;margin:0">&copy; 2025 Subspace Platform</p>
    </div>
  </div>
</body>
</html>
