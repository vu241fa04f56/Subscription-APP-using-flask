<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My List — Subspace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .main-content { padding:0; overflow-y:auto; }

    /* Top bar */
    .wl-topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; background:var(--bg);
      position:sticky; top:0; z-index:50;
      border-bottom:1px solid var(--border);
    }
    .wl-topbar h1 { font-size:20px; font-weight:800; font-family:var(--font-display); }
    #wl-count { font-size:12px; color:var(--text-muted); margin-top:2px; }

    /* Section rows — same as Watch */
    .ott-sec { padding:20px 0 4px; }
    .ott-sec-hdr { display:flex; align-items:center; justify-content:space-between; padding:0 20px 10px; }
    .ott-sec-ttl { font-size:16px; font-weight:800; font-family:var(--font-display); }
    .ott-row { display:flex; gap:10px; overflow-x:auto; padding:0 20px 12px; scrollbar-width:none; }
    .ott-row::-webkit-scrollbar { display:none; }

    /* Movie card — same as Watch */
    .mc { flex-shrink:0; width:110px; cursor:pointer; }
    .mc-poster {
      width:110px; height:165px; border-radius:8px; overflow:hidden;
      position:relative; background:var(--bg-card); border:1px solid var(--border);
    }
    .mc-poster img { width:100%; height:100%; object-fit:cover; display:block; }
    .mc-badge { position:absolute; top:5px; left:5px; font-size:9px; font-weight:800; padding:2px 6px; border-radius:3px; color:#fff; text-transform:uppercase; }
    .mc-badge-lang { background:#1e40af; }
    .mc-badge-new  { background:#059669; }
    .mc-badge-hot  { background:#dc2626; }
    .mc-hover { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; border-radius:8px; }
    .mc:hover .mc-hover { opacity:1; }
    .mc:hover .mc-poster { transform:scale(1.03); transition:transform 0.2s; }
    .mc-play { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.92); display:flex; align-items:center; justify-content:center; font-size:14px; color:#000; }
    /* Remove button (always visible since it's in list) */
    .mc-wl {
      position:absolute; top:5px; right:5px;
      width:24px; height:24px; border-radius:50%;
      background:var(--primary); border:none; color:#fff;
      font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.2s;
    }
    .mc-wl:hover { background:#ef4444; transform:scale(1.1); }
    .mc-title { font-size:11.5px; font-weight:600; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mc-sub { font-size:10px; color:var(--text-muted); margin-top:2px; }

    /* Empty state */
    .wl-empty { text-align:center; padding:80px 20px; color:var(--text-muted); }
    .wl-empty-icon { font-size:56px; margin-bottom:16px; }
    .wl-empty h3 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:8px; }
    .wl-empty p { font-size:13px; line-height:1.6; }

    /* Modal */
    .ott-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85);
      backdrop-filter:blur(12px); z-index:1000;
      display:flex; align-items:flex-end; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .ott-modal-overlay.open { opacity:1; pointer-events:all; }
    .ott-modal {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:20px 20px 0 0; width:100%; max-width:640px;
      max-height:88vh; overflow-y:auto;
      transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.34,1.15,0.64,1);
    }
    .ott-modal-overlay.open .ott-modal { transform:translateY(0); }
    .modal-drag-bar { width:40px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
    .modal-banner { width:100%; aspect-ratio:16/9; position:relative; overflow:hidden; }
    .modal-banner img { width:100%; height:100%; object-fit:cover; }
    .modal-banner-grad { position:absolute; inset:0; background:linear-gradient(to top,var(--bg-card) 0%,transparent 55%); }
    .modal-close { position:absolute; top:10px; right:12px; z-index:2; width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,0.65); border:none; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .modal-body { padding:14px 20px 32px; }
    .modal-title { font-size:21px; font-weight:800; font-family:var(--font-display); margin-bottom:6px; }
    .modal-meta { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .modal-meta span { font-size:12px; color:var(--text-muted); }
    .modal-meta .mm-r { color:#f59e0b; font-weight:700; }
    .modal-desc { font-size:13px; line-height:1.65; color:var(--text-muted); margin-bottom:16px; }
    .modal-acts { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .btn-modal-play { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; background:#fff; color:#000; border:none; border-radius:8px; padding:11px 20px; font-weight:800; font-size:14px; cursor:pointer; min-width:120px; }
    .btn-modal-remove { display:flex; align-items:center; gap:6px; background:rgba(239,68,68,0.12); border:1px solid #ef4444; color:#ef4444; border-radius:8px; padding:11px 16px; font-weight:700; font-size:13px; cursor:pointer; }
    .eps-wrap { border-top:1px solid var(--border); padding-top:14px; }
    .eps-wrap h4 { font-size:14px; font-weight:700; margin-bottom:10px; }
    .ep-item { display:flex; gap:10px; padding:8px; border-radius:8px; cursor:pointer; margin-bottom:4px; }
    .ep-item:hover { background:var(--bg-elevated); }
    .ep-thumb { width:96px; flex-shrink:0; aspect-ratio:16/9; border-radius:5px; overflow:hidden; background:var(--bg-elevated); }
    .ep-info .ep-title { font-size:12px; font-weight:600; }
    .ep-info .ep-desc  { font-size:11px; color:var(--text-muted); margin-top:2px; line-height:1.4; }
    .ep-info .ep-dur   { font-size:10px; color:var(--text-muted); margin-top:3px; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo-wrap">
      <svg class="sidebar-logo-icon" viewBox="0 0 32 32" fill="none">
        <defs><linearGradient id="slg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6c47ff"/><stop offset="100%" stop-color="#a855f7"/>
        </linearGradient></defs>
        <circle cx="16" cy="16" r="14" stroke="url(#slg)" stroke-width="2" fill="none"/>
        <circle cx="16" cy="16" r="3.5" fill="url(#slg)"/>
        <circle cx="7" cy="12" r="2" fill="url(#slg)" opacity="0.8"/>
        <circle cx="25" cy="12" r="2" fill="url(#slg)" opacity="0.8"/>
        <line x1="7" y1="12" x2="16" y2="16" stroke="url(#slg)" stroke-width="1.2" opacity="0.5"/>
        <line x1="25" y1="12" x2="16" y2="16" stroke="url(#slg)" stroke-width="1.2" opacity="0.5"/>
      </svg>
      <div class="sidebar-logo" style="padding:0;border-bottom:none">SUBSPACE</div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <a href="/dashboard.html" class="nav-item"><span class="icon">⚡</span> Dashboard</a>
        <a href="/nearby.html" class="nav-item"><span class="icon">📍</span> Nearby</a>
        <a href="/chat.html" class="nav-item"><span class="icon">💬</span> Messages</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Entertainment</div>
        <a href="/ott.html" class="nav-item"><span class="icon">🎬</span> Watch</a>
        <a href="/ott-watchlist.html" class="nav-item active"><span class="icon">🔖</span> My List</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a href="/subscriptions.html" class="nav-item"><span class="icon">⭐</span> Subscriptions</a>
        <a href="/payments.html" class="nav-item"><span class="icon">💳</span> Payments</a>
        <a href="/profile.html" class="nav-item"><span class="icon">👤</span> Profile</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-avatar"><span data-user-initial>U</span></div>
      <div>
        <div style="font-size:13px;font-weight:600" data-user-name>Loading…</div>
        <span class="badge" data-user-premium></span>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="wl-topbar">
      <div>
        <h1>🔖 My List</h1>
        <div id="wl-count">Loading…</div>
      </div>
      <a href="/ott.html" class="btn btn-outline" style="font-size:12px;padding:7px 16px">＋ Browse More</a>
    </div>
    <div id="wl-body"></div>
  </main>
</div>

<!-- Modal -->
<div class="ott-modal-overlay" id="content-modal">
  <div class="ott-modal">
    <div class="modal-drag-bar"></div>
    <div class="modal-banner">
      <img id="modal-banner-img" src="" alt=""/>
      <div class="modal-banner-grad"></div>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta">
        <span class="mm-r" id="modal-rating"></span>
        <span id="modal-year"></span>
        <span id="modal-type"></span>
        <span id="modal-genre-tag"></span>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-acts">
        <button class="btn-modal-play" id="modal-play-btn">▶ Play</button>
        <button class="btn-modal-remove" id="modal-remove-btn">✕ Remove from List</button>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase">Cast</div>
        <div id="modal-cast" style="font-size:12px;color:var(--text)"></div>
      </div>
      <div class="eps-wrap" id="modal-episodes" style="display:none">
        <h4>Episodes</h4>
        <div id="modal-episodes-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js?v=5"></script>
<script src="/js/ott-watchlist.js?v=5"></script>
</body>
</html>
