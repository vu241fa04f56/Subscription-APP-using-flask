<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Subspace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .main-content { animation: pageFadeIn 0.5s ease both; }
    @keyframes pageFadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .sidebar-logo-wrap { display:flex; align-items:center; gap:10px; padding:0 24px 24px; border-bottom:1px solid var(--border); }
    .sidebar-logo-icon { width:32px; height:32px; flex-shrink:0; }
    .sidebar-logo { padding:0; border-bottom:none; }
    /* Message send animation */
    .message { animation: msgPop 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes msgPop { from { opacity:0; transform:scale(0.85) translateY(8px); } to { opacity:1; transform:none; } }
    /* Typing indicator */
    .typing-dots span {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      background:var(--text-muted); margin:0 2px;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingBounce { 0%,80%,100% { transform:scale(0.7); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }
  </style>
</head>
<body>
<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo-wrap">
      <svg class="sidebar-logo-icon" viewBox="0 0 32 32" fill="none">
        <defs><linearGradient id="slg2" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6c47ff"/><stop offset="100%" stop-color="#a855f7"/>
        </linearGradient></defs>
        <circle cx="16" cy="16" r="14" stroke="url(#slg2)" stroke-width="2" fill="none"/>
        <circle cx="16" cy="16" r="3.5" fill="url(#slg2)"/>
        <circle cx="7" cy="12" r="2" fill="url(#slg2)" opacity="0.8"/>
        <circle cx="25" cy="12" r="2" fill="url(#slg2)" opacity="0.8"/>
        <circle cx="7" cy="22" r="2" fill="url(#slg2)" opacity="0.6"/>
        <circle cx="25" cy="22" r="2" fill="url(#slg2)" opacity="0.6"/>
        <line x1="7" y1="12" x2="16" y2="16" stroke="url(#slg2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="25" y1="12" x2="16" y2="16" stroke="url(#slg2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="7" y1="22" x2="16" y2="16" stroke="url(#slg2)" stroke-width="1.2" opacity="0.5"/>
        <line x1="25" y1="22" x2="16" y2="16" stroke="url(#slg2)" stroke-width="1.2" opacity="0.5"/>
      </svg>
      <div class="sidebar-logo">SUBSPACE</div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <a href="/dashboard.html" class="nav-item"><span class="icon">⚡</span> Dashboard</a>
        <a href="/nearby.html"    class="nav-item"><span class="icon">📍</span> Nearby</a>
        <a href="/chat.html"      class="nav-item active"><span class="icon">💬</span> Messages</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <a href="/subscriptions.html" class="nav-item"><span class="icon">⭐</span> Subscriptions</a>
        <a href="/payments.html"      class="nav-item"><span class="icon">💳</span> Payments</a>
        <a href="/profile.html"       class="nav-item"><span class="icon">👤</span> Profile</a>
      </div>
    </nav>
  </aside>

  <main class="main-content" style="padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1 style="font-size:22px">Messages</h1>
      <button id="new-chat-btn" class="btn btn-primary" style="font-size:13px">+ New Chat</button>
    </div>
    <div class="chat-layout">
      <div class="conversations-panel">
        <h3>Conversations</h3>
        <div class="conversations-list" id="conversations-list">
          <p class="empty-chat">Loading…</p>
        </div>
      </div>
      <div class="chat-window" id="chat-window" style="display:flex;flex-direction:column">
        <!-- Chat Header -->
        <div id="chat-window-header" style="display:none;padding:12px 20px;border-bottom:1px solid var(--border);align-items:center;gap:12px;background:rgba(255,255,255,0.01)">
          <div class="conv-avatar" id="chat-header-avatar" style="width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#fff"></div>
          <div style="flex:1">
            <h4 id="chat-header-name" style="margin:0;font-size:14px;font-weight:600">User</h4>
            <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
              <span id="chat-header-id" style="font-size:11px;color:var(--text-muted)">User ID: —</span>
              <span id="chat-header-status" style="font-size:11px;color:var(--text-muted)"></span>
            </div>
          </div>
        </div>

        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px" id="chat-placeholder">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" opacity="0.3">
            <circle cx="24" cy="24" r="20" stroke="#6c47ff" stroke-width="2"/>
            <path d="M16 22h16M16 28h10" stroke="#6c47ff" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p style="color:var(--text-muted);font-size:14px">Select a conversation to start chatting</p>
        </div>
        <div class="messages-container" id="messages-container" style="display:none;flex-direction:column;flex:1"></div>
        <div class="chat-input-area" id="chat-input-area" style="display:none">
          <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/chat.js"></script>
<!-- BUG FIX: removed broken window.selectChat override that called undefined origSelect.
     The show/hide of chat panels is now handled inside chat.js's selectChat function directly. -->
</body>
</html>
