<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player — Subspace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #000; overflow: hidden; }
    .player-page {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      background: #000;
    }
    .player-top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: 20px 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      display: flex; align-items: center; justify-content: space-between;
      opacity: 0; transition: opacity 0.3s;
    }
    .player-page:hover .player-top-bar,
    .player-page.controls-visible .player-top-bar { opacity: 1; }
    .player-back {
      display: flex; align-items: center; gap: 8px; color: #fff;
      font-weight: 600; font-size: 14px; cursor: pointer;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(8px);
      text-decoration: none; transition: background 0.2s;
    }
    .player-back:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .player-title-bar {
      text-align: center; color: #fff;
    }
    .player-title-bar h2 { font-size: 16px; font-weight: 700; font-family: var(--font-display); }
    .player-title-bar p  { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }

    /* Main video area */
    .player-video-area {
      position: relative; flex: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .player-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; color: rgba(255,255,255,0.5);
      width: 100%; height: 100%;
    }
    .player-placeholder-icon { font-size: 80px; filter: drop-shadow(0 0 30px rgba(108,71,255,0.5)); }
    .player-placeholder-text { font-size: 16px; }
    .player-big-play {
      position: absolute; width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #fff; cursor: pointer;
      transition: all 0.2s; opacity: 0;
    }
    .player-page:hover .player-big-play,
    .player-page.controls-visible .player-big-play { opacity: 1; }
    .player-big-play:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }

    /* Controls bar */
    .player-controls-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 16px 32px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .player-page:hover .player-controls-bar,
    .player-page.controls-visible .player-controls-bar { opacity: 1; }

    .player-progress {
      width: 100%; height: 5px;
      background: rgba(255,255,255,0.25); border-radius: 3px;
      margin-bottom: 14px; cursor: pointer; position: relative;
    }
    .player-progress:hover { height: 7px; }
    .player-progress-fill {
      height: 100%; background: var(--gradient); border-radius: 3px;
      width: 35%; transition: width 0.5s linear;
    }
    .player-progress-handle {
      position: absolute; top: 50%; right: calc(65% - 6px);
      width: 12px; height: 12px; border-radius: 50%;
      background: #fff; transform: translateY(-50%);
      opacity: 0; transition: opacity 0.2s;
    }
    .player-progress:hover .player-progress-handle { opacity: 1; }

    .player-controls-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .player-left { display: flex; align-items: center; gap: 20px; }
    .player-right { display: flex; align-items: center; gap: 16px; }
    .ctrl-btn {
      background: none; border: none; color: rgba(255,255,255,0.8);
      font-size: 18px; cursor: pointer; transition: all 0.15s; padding: 4px;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.15); }
    .ctrl-btn.play-pause { font-size: 24px; color: #fff; }
    .player-time { font-size: 13px; color: rgba(255,255,255,0.7); white-space: nowrap; }
    .volume-slider {
      width: 80px; height: 4px; background: rgba(255,255,255,0.3);
      border-radius: 2px; cursor: pointer; position: relative;
    }
    .volume-fill { height: 100%; background: #fff; border-radius: 2px; width: 75%; }

    /* Episode panel */
    .episode-panel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 320px;
      background: rgba(13,13,26,0.95); backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%); transition: transform 0.3s ease;
      z-index: 20; overflow-y: auto; padding: 20px;
    }
    .episode-panel.open { transform: translateX(0); }
    .episode-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .ep-item {
      display: flex; gap: 12px; padding: 10px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; margin-bottom: 6px;
    }
    .ep-item:hover { background: rgba(255,255,255,0.06); }
    .ep-item.active { background: rgba(108,71,255,0.2); border: 1px solid rgba(108,71,255,0.3); }
    .ep-num { font-size: 20px; color: var(--text-muted); font-weight: 700; width: 28px; }
    .ep-info .ep-title { font-size: 13px; font-weight: 600; }
    .ep-info .ep-dur   { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  </style>
</head>
<body>
<div class="player-page" id="player-page">
  <!-- Top bar -->
  <div class="player-top-bar">
    <a href="/ott.html" class="player-back">← Back</a>
    <div class="player-title-bar">
      <h2 id="player-title">Loading…</h2>
      <p id="player-subtitle"></p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="ctrl-btn" id="episodes-toggle-btn" title="Episodes" style="color:#fff;font-size:15px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:8px 14px;border-radius:20px;font-weight:600">Episodes</button>
      <a id="imdb-link-btn" href="#" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;background:#f5c518;color:#000;font-weight:800;font-size:13px;padding:8px 14px;border-radius:20px;text-decoration:none">IMDb ↗</a>
    </div>
  </div>

  <!-- Video area -->
  <div class="player-video-area" id="player-area">
    <div class="player-placeholder">
      <div class="player-placeholder-icon" id="player-icon">🎬</div>
      <div class="player-placeholder-text">Video would play here in a real deployment</div>
    </div>
    <button class="player-big-play" id="big-play-btn">⏸</button>
  </div>

  <!-- Controls -->
  <div class="player-controls-bar">
    <div class="player-progress" id="progress-bar">
      <div class="player-progress-fill" id="progress-fill"></div>
      <div class="player-progress-handle"></div>
    </div>
    <div class="player-controls-row">
      <div class="player-left">
        <button class="ctrl-btn" id="rewind-btn" title="Rewind 10s">⏮</button>
        <button class="ctrl-btn play-pause" id="play-pause-btn">⏸</button>
        <button class="ctrl-btn" id="forward-btn" title="Forward 10s">⏭</button>
        <div class="player-time" id="player-time">35:22 / 1:40:00</div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="ctrl-btn" title="Volume">🔊</button>
          <div class="volume-slider"><div class="volume-fill"></div></div>
        </div>
      </div>
      <div class="player-right">
        <button class="ctrl-btn" title="Subtitles" style="font-size:13px;opacity:0.7">CC</button>
        <button class="ctrl-btn" title="Quality" style="font-size:12px;opacity:0.7">HD</button>
        <button class="ctrl-btn" title="Fullscreen" id="fullscreen-btn">⛶</button>
      </div>
    </div>
  </div>

  <!-- Episodes panel -->
  <div class="episode-panel" id="episode-panel">
    <h3>Episodes</h3>
    <div id="episodes-list-panel"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  requireAuth();
  const params = new URLSearchParams(window.location.search);
  const contentId = params.get('id');
  if (!contentId) { window.location.href = '/ott.html'; return; }

  const EMOJIS = { drama:'🎭', action:'💥', comedy:'😂', thriller:'🔪', 'sci-fi':'🚀', romance:'💕', horror:'👻', default:'🎬' };

  // Load content info
  let item = null;
  try {
    const res  = await get(`/ott/content/${contentId}`);
    const data = await res.json();
    if (data.success) item = data.data;
  } catch(e) {}

  if (!item) {
    item = getDemoContent().find(c => c.id === contentId) || { title: 'Content', genre: 'Drama', type: 'movie' };
  }

  // IMDb links map
  const IMDB = {
    'b1':'https://www.imdb.com/find/?q=O+Romeo+2026','b2':'https://www.imdb.com/title/tt14969810/','b3':'https://www.imdb.com/title/tt10280296/','b4':'https://www.imdb.com/find/?q=Kara+2025','b5':'https://www.imdb.com/find/?q=Off+Campus+2025','b6':'https://www.imdb.com/title/tt14257582/','b7':'https://www.imdb.com/title/tt23849204/','b8':'https://www.imdb.com/title/tt12854838/','b9':'https://www.imdb.com/title/tt13751694/','b10':'https://www.imdb.com/title/tt15383078/',
    'h1':'https://www.imdb.com/title/tt21320868/','h2':'https://www.imdb.com/find/?q=In+the+Grey+2026','h3':'https://www.imdb.com/find/?q=Crimson+Verdict','h4':'https://www.imdb.com/find/?q=Apex+Rising','h5':'https://www.imdb.com/find/?q=Neon+Labyrinth','h6':'https://www.imdb.com/title/tt12263384/','h7':'https://www.imdb.com/find/?q=The+Last+Algorithm','h8':'https://www.imdb.com/find/?q=Iron+Meridian',
    's1':'https://www.imdb.com/find/?q=Stellar+Drift','s2':'https://www.imdb.com/title/tt4574334/','s3':'https://www.imdb.com/find/?q=Parallel+Hearts','s4':'https://www.imdb.com/find/?q=Spice+Route','s5':'https://www.imdb.com/title/tt4786824/','s6':'https://www.imdb.com/find/?q=Quiet+Hours',
    'c1':'https://www.imdb.com/find/?q=Seoul+Bloom','c2':'https://www.imdb.com/find/?q=Monsoon+Wedding','c3':'https://www.imdb.com/title/tt10986410/','c4':'https://www.imdb.com/find/?q=The+Sweetest+Con','c5':'https://www.imdb.com/find/?q=Love+in+Ladakh',
    'a1':'https://www.imdb.com/find/?q=Karna+animation','a2':'https://www.imdb.com/title/tt9362722/',
    't1':'https://www.imdb.com/find/?q=Obsess+horror','t2':'https://www.imdb.com/title/tt29623480/','t3':'https://www.imdb.com/find/?q=Kashmir+Files+2','t4':'https://www.imdb.com/title/tt27004217/',
  };
  const imdbUrl = item.imdb || IMDB[contentId] || `https://www.imdb.com/find/?q=${encodeURIComponent(item.title||'')}`;

  document.getElementById('player-title').textContent = item.title;
  document.getElementById('player-subtitle').textContent = item.type === 'series' ? `Season 1, Episode 1` : item.duration || '';
  document.getElementById('player-icon').textContent = EMOJIS[(item.genre||'').toLowerCase()] || EMOJIS.default;

  // Replace placeholder text with IMDb open button
  document.querySelector('.player-placeholder-text').innerHTML =
    `This title is available on IMDb &nbsp;·&nbsp; <a href="${imdbUrl}" target="_blank" rel="noopener" style="color:#f5c518;font-weight:700;text-decoration:none;background:rgba(245,197,24,0.15);padding:6px 16px;border-radius:20px;border:1px solid #f5c518">▶ Open on IMDb</a>`;

  // Big play button also opens IMDb
  document.getElementById('big-play-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    window.open(imdbUrl, '_blank', 'noopener');
  }, { once: true });

  // Set IMDb link button
  document.getElementById('imdb-link-btn').href = imdbUrl;

  // Hide episodes button for movies
  if (item.type !== 'series') {
    document.getElementById('episodes-toggle-btn').style.display = 'none';
  } else if (item.episodes) {
    const list = document.getElementById('episodes-list-panel');
    item.episodes.forEach((ep, i) => {
      const div = document.createElement('div');
      div.className = `ep-item${i === 0 ? ' active' : ''}`;
      div.innerHTML = `<div class="ep-num">${i+1}</div><div class="ep-info"><div class="ep-title">${ep.title}</div><div class="ep-dur">${ep.duration||'45m'}</div></div>`;
      div.addEventListener('click', () => {
        document.querySelectorAll('.ep-item').forEach(e => e.classList.remove('active'));
        div.classList.add('active');
        document.getElementById('player-subtitle').textContent = `Season 1, Episode ${i+1}: ${ep.title}`;
      });
      list.appendChild(div);
    });
  }

  // Play/pause simulation
  let playing = true;
  let progress = 35;
  const playPauseBtn = document.getElementById('play-pause-btn');
  const bigPlayBtn   = document.getElementById('big-play-btn');
  const progressFill = document.getElementById('progress-fill');
  const timeEl       = document.getElementById('player-time');

  function updatePlayState() {
    playPauseBtn.textContent = playing ? '⏸' : '▶';
    bigPlayBtn.textContent   = playing ? '⏸' : '▶';
  }

  function togglePlay() { playing = !playing; updatePlayState(); }
  playPauseBtn.addEventListener('click', togglePlay);
  bigPlayBtn.addEventListener('click', togglePlay);
  document.getElementById('player-area').addEventListener('click', togglePlay);

  // Simulate progress
  setInterval(() => {
    if (!playing) return;
    progress = Math.min(progress + 0.01, 100);
    progressFill.style.width = progress + '%';
    const total = 100 * 60;
    const cur   = Math.floor((progress / 100) * total);
    const mins  = Math.floor(cur / 60).toString().padStart(2,'0');
    const secs  = (cur % 60).toString().padStart(2,'0');
    timeEl.textContent = `${mins}:${secs} / 1:40:00`;
    // Save progress to backend
    if (Math.round(progress) % 10 === 0) {
      post('/ott/watch-history', { content_id: contentId, progress_percent: Math.round(progress) }).catch(()=>{});
    }
  }, 500);

  // Progress bar click
  document.getElementById('progress-bar').addEventListener('click', e => {
    const rect = e.currentTarget.getBoundingClientRect();
    progress = ((e.clientX - rect.left) / rect.width) * 100;
    progressFill.style.width = progress + '%';
  });

  // Episodes panel
  document.getElementById('episodes-toggle-btn').addEventListener('click', () => {
    document.getElementById('episode-panel').classList.toggle('open');
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowRight') progress = Math.min(progress + 2, 100);
    if (e.key === 'ArrowLeft')  progress = Math.max(progress - 2, 0);
    if (e.key === 'Escape') window.location.href = '/ott.html';
  });

  // Controls visibility
  let hideTimer;
  const page = document.getElementById('player-page');
  document.addEventListener('mousemove', () => {
    page.classList.add('controls-visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => page.classList.remove('controls-visible'), 3000);
  });
});

function getDemoContent() {
  return [
    { id:'1', title:'Stellar Drift', type:'series', genre:'Sci-Fi', duration:'52m', episodes:[{title:'Pilot',duration:'52m'},{title:'The Signal',duration:'48m'}] },
    { id:'2', title:'Crimson Verdict', type:'movie', genre:'Thriller', duration:'2h 14m' },
    { id:'3', title:'Seoul Bloom', type:'series', genre:'Romance', episodes:[{title:'Kitchen Wars',duration:'46m'}] },
    { id:'4', title:'The Last Algorithm', type:'series', genre:'Thriller', episodes:[{title:'Prediction Zero',duration:'58m'},{title:'False Positive',duration:'51m'}] },
  ];
}
</script>
</body>
</html>
