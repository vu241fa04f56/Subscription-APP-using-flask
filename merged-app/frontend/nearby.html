<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nearby — Subspace</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Leaflet Map Assets -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
<div class="page-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo-wrap" style="display:flex;align-items:center;gap:10px;padding:0 24px 24px;border-bottom:1px solid var(--border)"><svg style="width:32px;height:32px;flex-shrink:0" viewBox="0 0 32 32" fill="none"><defs><linearGradient id="slgX" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6c47ff"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs><circle cx="16" cy="16" r="14" stroke="url(#slgX)" stroke-width="2" fill="none"/><circle cx="16" cy="16" r="3.5" fill="url(#slgX)"/><circle cx="7" cy="12" r="2" fill="url(#slgX)" opacity="0.8"/><circle cx="25" cy="12" r="2" fill="url(#slgX)" opacity="0.8"/><line x1="7" y1="12" x2="16" y2="16" stroke="url(#slgX)" stroke-width="1.2" opacity="0.5"/><line x1="25" y1="12" x2="16" y2="16" stroke="url(#slgX)" stroke-width="1.2" opacity="0.5"/></svg><div class="sidebar-logo" style="padding:0;border-bottom:none">SUBSPACE</div></div>
    <nav>
      <div class="nav-section">
        <a href="/dashboard.html" class="nav-item"><span class="icon">⚡</span> Dashboard</a>
        <a href="/nearby.html" class="nav-item active"><span class="icon">📍</span> Nearby</a>
        <a href="/chat.html" class="nav-item"><span class="icon">💬</span> Messages</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Entertainment</div>
        <a href="/ott.html" class="nav-item"><span class="icon">🎬</span> Watch</a>
        <a href="/ott-watchlist.html" class="nav-item"><span class="icon">🔖</span> My List</a>
      </div>
      <div class="nav-section">
        <a href="/subscriptions.html" class="nav-item"><span class="icon">⭐</span> Subscriptions</a>
        <a href="/payments.html" class="nav-item"><span class="icon">💳</span> Payments</a>
        <a href="/profile.html" class="nav-item"><span class="icon">👤</span> Profile</a>
      </div>
    </nav>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <h1>People Nearby</h1>
      <p>Discover professionals and creators around you</p>
    </div>
    <div class="card" style="margin-bottom:24px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <button id="get-location-btn" class="btn btn-primary">📍 Get My Location</button>
      <div style="display:flex;align-items:center;gap:10px" id="radius-slider-wrap">
        <label class="form-label" style="margin:0;white-space:nowrap">Radius (km):</label>
        <input type="range" id="radius-input" min="5" max="100" value="50" style="width:140px">
        <span id="radius-value" style="font-size:13px;color:var(--text-muted);min-width:40px">50 km</span>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;margin:0;user-select:none">
        <input type="checkbox" id="global-search-checkbox" style="width:16px;height:16px;cursor:pointer">
        <span>Global Search (Infinite)</span>
      </label>
    </div>
    <div id="location-display" class="card hidden" style="margin-bottom:24px; font-size:15px; display:flex; align-items:center; gap:8px;">
      <span>📍 Located in:</span> <strong id="user-city-country">Loading location...</strong>
    </div>

    <!-- World Map Container -->
    <div id="map-card" class="card" style="margin-bottom: 24px; padding: 16px; border-radius: 16px;">
      <h3 style="margin-top:0; margin-bottom:12px; font-size:16px; display:flex; align-items:center; gap:8px; color: var(--text);">🌍 World Map — Registered Users</h3>
      <div id="map" style="height: 380px; width: 100%; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; z-index: 1;"></div>
    </div>

    <div id="nearby-container" class="nearby-grid">
      <p class="empty-state">Click "Get My Location" to find nearby users.</p>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<!-- Load ott.js data so NOW_WATCHING and ALL_MOVIES are available on the map -->
<script src="/js/ott.js?v=6"></script>
<script src="/js/nearby.js"></script>
<script>
  document.getElementById('radius-input').addEventListener('input', function() {
    document.getElementById('radius-value').textContent = this.value + ' km';
  });
</script>
</body>
</html>
